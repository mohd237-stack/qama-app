<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطولة محمد بن أحمد الهلال أبو سالم</title>
    <!-- تضمين مكتبة Tailwind للتصميم الأنيق والسريع -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#15803d', // الأخضر
                        gold: '#b45309',    // الذهبي
                        cream: '#fefce8'   // الكريمي
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Tahoma', 'Arial', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>

    <!-- الجزء الخاص بربط جدول جوجل - ضع الـ ID الخاص بجدولك هنا -->
    <script>
        const SHEET_ID = 'const SHEET_ID = '1En231QxZ_itb_lmC1UKXR700YA6vxuYE';';
        
        async function fetchSheetData(tabName) {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tabName)}`;
                const response = await fetch(url);
                const text = await response.text();
                // تنظيف البيانات القادمة من جوجل لتحويلها إلى JSON صريح
                const json = JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));
                const rows = json.table.rows;
                const headings = json.table.cols.map(c => c.label);
                
                return rows.map(r => {
                    const rowData = {};
                    r.c.forEach((cell, i) => {
                        if(headings[i]) {
                            rowData[headings[i]] = cell ? cell.v : '';
                        }
                    });
                    return rowData;
                });
            } catch (error) {
                console.error("خطأ في جلب البيانات من جدول جوجل:", error);
                return [];
            }
        }
    </script>

    <!-- واجهة هيرو الترحيبية -->
    <div class="bg-gradient-to-b from-black to-green-950 text-white py-16 px-4 text-center border-b-4 border-amber-500">
        <h1 id="main-title" class="text-3xl md:text-5xl font-bold text-amber-400 mb-4">جاري تحميل اسم البطولة...</h1>
        <p id="main-desc" class="text-base md:text-xl text-gray-300 max-w-2xl mx-auto">مرحباً بكم في الموقع الرسمي للبطولة.</p>
    </div>

    <!-- المحتوى الرئيسي للموقع -->
    <div class="max-w-6xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- قسم جدول الترتيب (يأخذ مساحة أكبر) -->
        <div class="lg:col-span-2 bg-white rounded-xl shadow-md p-6 border-t-4 border-green-600">
            <h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                🏆 جدول ترتيب البطولة
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full text-right border-collapse">
                    <thead>
                        <tr class="bg-green-50 text-green-800 border-b border-gray-200">
                            <th class="p-3">المركز</th>
                            <th class="p-3">الفريق</th>
                            <th class="p-3">لعب</th>
                            <th class="p-3">فاز</th>
                            <th class="p-3">تعادل</th>
                            <th class="p-3">خسارة</th>
                            <th class="p-3 font-bold text-amber-600">النقاط</th>
                        </tr>
                    </thead>
                    <tbody id="standings-table">
                        <tr><td colspan="7" class="text-center p-4 text-gray-500">جاري تحديث جدول الترتيب...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- قسم الهدافين واللاعبين المتميزين -->
        <div class="bg-white rounded-xl shadow-md p-6 border-t-4 border-amber-500">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">⚽ قائمة الهدافين</h2>
            <div id="players-list" class="space-y-4">
                <p class="text-gray-500 text-center">جاري تحميل قائمة اللاعبين...</p>
            </div>
        </div>

    </div>

    <!-- قسم الفعاليات وأحدث الأخبار -->
    <div class="max-w-6xl mx-auto px-4 py-4 mb-16">
        <div class="bg-white rounded-xl shadow-md p-6 border-t-4 border-blue-600">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">📅 فعاليات وأخبار البطولة</h2>
            <div id="events-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <p class="text-gray-500 text-center col-span-full">جاري تحميل الفعاليات والأخبار...</p>
            </div>
        </div>
    </div>

    <!-- كود التشغيل الذكي وربط البيانات بالواجهة -->
    <script>
        async function initApp() {
            // 1. جلب وإعداد بيانات الصفحة الرئيسية
            const configData = await fetchSheetData('الرئيسية');
            const titleObj = configData.find(item => item['العنصر'] === 'اسم_البطولة');
            if(titleObj) document.getElementById('main-title').innerText = titleObj['المحتوى'];
            
            // 2. جلب وتحديث جدول الترتيب
            const standingsData = await fetchSheetData('الترتيب');
            const standingsTable = document.getElementById('standings-table');
            if(standingsData.length > 0) {
                standingsTable.innerHTML = '';
                standingsData.forEach(row => {
                    standingsTable.innerHTML += `
                        <tr class="border-b border-gray-100 hover:bg-gray-50 transition">
                            <td class="p-3 font-bold">${row['المركز'] || '-'}</td>
                            <td class="p-3 font-semibold text-gray-700">${row['الفريق'] || '-'}</td>
                            <td class="p-3">${row['لعب'] || '0'}</td>
                            <td class="p-3 text-green-600">${row['فاز'] || '0'}</td>
                            <td class="p-3 text-gray-500">${row['تعادل'] || '0'}</td>
                            <td class="p-3 text-red-500">${row['خسارة'] || '0'}</td>
                            <td class="p-3 font-bold text-amber-600 bg-amber-50/50">${row['النقاط'] || '0'}</td>
                        </tr>
                    `;
                });
            } else {
                standingsTable.innerHTML = '<tr><td colspan="7" class="text-center p-4 text-red-500">لم يتم إضافة بيانات ترتيب حتى الآن.</td></tr>';
            }

            // 3. جلب وتحديث قائمة اللاعبين والهدافين
            const playersData = await fetchSheetData('اللاعبين');
            const playersList = document.getElementById('players-list');
            if(playersData.length > 0) {
                playersList.innerHTML = '';
                playersData.forEach(player => {
                    const imgUrl = player['رابط_الصورة'] || 'https://via.placeholder.com/150?text=Player';
                    playersList.innerHTML += `
                        <div class="flex items-center gap-4 p-2 rounded-lg hover:bg-gray-50 border border-transparent hover:border-gray-100 transition">
                            <img src="${imgUrl}" class="w-12 h-12 rounded-full object-cover border-2 border-amber-400" alt="${player['الاسم']}">
                            <div class="flex-1">
                                <h3 class="font-bold text-gray-800">${player['الاسم']}</h3>
                                <p class="text-xs text-gray-500">${player['الفريق']}</p>
                            </div>
                            <div class="bg-amber-100 text-amber-800 px-3 py-1 rounded-full font-bold text-sm">
                                ${player['الأهداف']} أهداف
                            </div>
                        </div>
                    `;
                });
            } else {
                playersList.innerHTML = '<p class="text-gray-500 text-center">لا توجد بيانات لاعبين حالياً.</p>';
            }

            // 4. جلب وتحديث شبكة الفعاليات والأخبار
            const eventsData = await fetchSheetData('الفعاليات');
            const eventsGrid = document.getElementById('events-grid');
            if(eventsData.length > 0) {
                eventsGrid.innerHTML = '';
                eventsData.forEach(ev => {
                    const imgUrl = ev['رابط_الصورة'] || 'https://via.placeholder.com/400x200?text=Event';
                    eventsGrid.innerHTML += `
                        <div class="bg-white rounded-lg border border-gray-200 overflow-hidden shadow-sm hover:shadow-md transition">
                            <img src="${imgUrl}" class="w-full h-40 object-cover" alt="${ev['العنوان']}">
                            <div class="p-4">
                                <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded">${ev['التاريخ'] || ''}</span>
                                <h3 class="font-bold text-gray-850 mt-2 text-lg">${ev['العنوان']}</h3>
                                <p class="text-sm text-gray-600 mt-1">${ev['الوصف'] || ''}</p>
                            </div>
                        </div>
                    `;
                });
            } else {
                eventsGrid.innerHTML = '<p class="text-gray-500 text-center col-span-full">لا توجد فعاليات مضافة حالياً.</p>';
            }
        }

        // تشغيل التطبيق فور تحميل الصفحة
        window.onload = initApp;
    </script>
</body>
</html>
